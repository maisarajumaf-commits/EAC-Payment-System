version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: eac-postgres
    environment:
      POSTGRES_DB: eac_payment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eac_payment"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eac-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: eac-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eac-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  eac-network:
    driver: bridge
